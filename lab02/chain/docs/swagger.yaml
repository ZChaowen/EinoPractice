definitions:
  main.ChainRequest:
    description: Chain聊天请求结构
    properties:
      user_query:
        description: UserQuery 用户查询内容
        example: 我叫morning，邮箱是lumworn@gmail.com，帮我制定训练计划
        type: string
    type: object
  main.ChainResponse:
    description: Chain聊天响应结构
    properties:
      content:
        description: Content 模型回复内容
        example: 根据您的信息，我们为您推荐...
        type: string
      output_tokens:
        description: OutputTokens 输出token数量
        example: 50
        type: integer
      prompt_tokens:
        description: PromptTokens 输入token数量
        example: 100
        type: integer
      reasoning_content:
        description: ReasoningContent 思考内容（如果有）
        example: ""
        type: string
      total_tokens:
        description: TotalTokens 总token数量
        example: 150
        type: integer
    type: object
info:
  contact: {}
  description: Chain聊天响应结构
paths:
  /chain:
    post:
      consumes:
      - application/json
      description: 基于Chain编排的篮球教练助手
      parameters:
      - description: Chain请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.ChainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.ChainResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Chain聊天接口
      tags:
      - chain
  /health:
    get:
      description: 检查服务是否正常运行
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 健康检查
      tags:
      - health
swagger: "2.0"
