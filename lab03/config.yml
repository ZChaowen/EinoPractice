model:
  base_url: "https://api.minimaxi.com/v1"
  api_key: "***"
  model_name: "MiniMax-M2.7"
  timeout: 30          # 超时时间(秒)
  temperature: 0.7     # 控制输出随机性，范围 [0.0, 2.0]，越高越随机
  top_p: 0.9          # 核采样参数，范围 [0.0, 1.0]，越低越聚焦
  max_tokens: 500     # 最大生成token数量

app:
  host: "0.0.0.0"
  port: 8080